server:
  port: 8080

spring:
  application:
    name: YuanQi

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yuanqi?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf-8
    username: root
    password: 123456

  # 邮件服务配置 - 用于邮箱验证
  mail:
    host: smtp.111.com
    port: 465
    username: AAZl3l4@111.com
    password: iBU9QcEDzTjbt73h
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # AI配置 - GLM API
  ai:
    zhipuai:
      api-key: 033fb7c42aa64b639060f739ee445cb2.VdeVZF1FsGa2gnwh
      base-url: https://open.bigmodel.cn/api/paas/v4
      chat:
        options:
          model: glm-4.7-flash
          temperature: 0.7

# Sa-Token配置
sa-token:
  # token名称
  token-name: Authorization
  # token有效期，单位秒，默认30天
  timeout: 2592000
  # token临时有效期，单位秒，-1代表永不过期
  active-timeout: -1
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 是否共享token
  is-share: false
  # token风格
  token-style: uuid
  # 是否输出操作日志
  is-log: true
  # JWT秘钥
  jwt-secret-key: niyongyuancaibudao

# 自定义配置
yuanqi:
  # 加密密钥（用于password和api_key加解密）
  crypto:
    secret-key: niyongyuancaibudao
  # 缓存配置
  cache:
    expire-minutes: 5
    max-size: 10000
  # 邮箱验证码配置
  email:
    code-expire: 300
    code-length: 6
  # 文件上传配置
  file:
    upload-path: ./uploads
    max-size: 10MB
    allowed-types: pdf,doc,docx,txt,md

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
logging:
  level:
    root: info
    com.YuanQi: debug
